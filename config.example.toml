[runtime]
mode = "live"
price_basis = "last"
alert_on_first_match = false

[universe]
mode = "underlyings"
underlyings = ["SHFE.AU2608"]
# Live-mode liquidity filters. 0 disables the filter; 1 filters out zero values.
min_volume = 0
min_open_interest = 0
# mode = "all"
# exchange_ids = ["SHFE", "DCE", "CZCE", "INE", "GFEX", "CFFEX"]
# mode = "symbols"
# symbols = ["SHFE.AU2608", "SHFE.AU2608C600"]

[datasource.tqsdk]
# username = "your-tqsdk-username"
# password = "your-tqsdk-password"
username_env = "TQSDK_USERNAME"
password_env = "TQSDK_PASSWORD"
symbol_info_batch_size = 500
quote_subscription_batch_size = 500

[[strategies]]
type = "cp_combo"
threshold = 0.01
name = "CP组合预警"
selected = true

[[strategies]]
type = "abs_spread"
threshold = 0.1
name = "价差预警"
selected = true

[backtest]
start_dt = "2026-01-02"
end_dt = "2026-01-05"
duration_seconds = 60
data_length = 2
initial_price_timeout_seconds = 120
subscription_batch_size = 50

[notifier]
# live defaults to email, backtest defaults to console.
# kind = "console"
# Runtime mode is inserted as a subdirectory: logs/live/alerts.jsonl or logs/backtest/alerts.jsonl.
alert_log_path = "logs/alerts.jsonl"

[notifier.email]
smtp_host = "smtp.example.com"
smtp_port = 587
smtp_timeout_seconds = 10
# Batch email alerts for this many seconds; 0 sends immediately.
alert_interval_seconds = 60
username = "alert@example.com"
password_env = "SMTP_PASSWORD"
from_addr = "alert@example.com"
to_addrs = ["receiver@example.com"]
use_tls = true
failure_backoff_seconds = 300

[logging]
level = "INFO"
# Runtime mode is inserted as a subdirectory: logs/live/kuaiqi.log or logs/backtest/kuaiqi.log.
log_dir = "logs"
log_file = "kuaiqi.log"
# Rotating logs cap disk usage at about max_bytes * (backup_count + 1).
max_bytes = 5000000
backup_count = 5
# INFO cycle summaries are throttled; per-cycle details are available at DEBUG.
# Set to 0 to log every cycle.
cycle_summary_interval_seconds = 60

[gui.active_alerts]
auto_refresh = true
refresh_interval_seconds = 10
