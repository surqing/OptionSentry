schema_version = 1

[runtime]
mode = "live"
alert_on_first_match = false

[universe]
mode = "include"
include = ["SHFE.au"]
exclude = []
exchanges = ["SHFE"]
min_volume = 0
min_open_interest = 0

[data_source]
provider = "tqsdk"

[data_source.tqsdk]
username_env = "TQSDK_USERNAME"
password_env = "TQSDK_PASSWORD"
symbol_info_batch_size = 500
quote_subscription_batch_size = 500

[[strategies]]
id = "cp_combo_positive"
type = "cp_combo"
name = "CP组合正向预警"
enabled = true

[strategies.parameters]
min_value = 0.01
max_value = inf

# Optional per-strategy option filter:
# [strategies.filter]
# script = "user_filter_scripts/by_expire_rest_days.py"
# entrypoint = "accept"

[[strategies]]
id = "cp_combo_negative"
type = "cp_combo"
name = "CP组合负向预警"
enabled = true

[strategies.parameters]
min_value = -inf
max_value = -0.01

[[strategies]]
id = "abs_spread_default"
type = "abs_spread"
name = "价差预警"
enabled = true

[strategies.parameters]
min_value = -inf
max_value = 0.1

[backtest]
start_date = 2026-01-01
end_date = 2026-06-30
kline_duration_seconds = 60
data_length = 2
initialization_timeout_seconds = 120
subscription_batch_size = 50

[notifications.channels]
popup = false
sound = false
file = true
email = false

[notifications.file]
path = "logs/alerts.jsonl"

[notifications.popup]
duration_seconds = 2

[notifications.sound]
duration_seconds = 2

[notifications.email]
smtp_host = ""
smtp_port = 587
smtp_timeout_seconds = 10
aggregation_seconds = 60
username_env = "SMTP_USERNAME"
password_env = "SMTP_PASSWORD"
from_address = ""
to_addresses = []
use_tls = true
failure_backoff_seconds = 300

[logging]
level = "INFO"
directory = "logs"
filename = "optionsentry.log"
max_bytes = 5000000
backup_count = 5
summary_interval_seconds = 60

[gui.active_alerts]
auto_refresh = true
refresh_interval_seconds = 10
