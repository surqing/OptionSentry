[runtime]
mode = "live"
price_basis = "last"
alert_on_first_match = false

[universe]
mode = "指定模式"
only_do = ["AU"]
not_do = []
# Live-mode liquidity filters. 0 disables the filter; 1 filters out zero values.
min_volume = 0
min_open_interest = 0
# mode = "all"
# exchange_ids = ["SHFE", "DCE", "CZCE", "INE", "GFEX", "CFFEX"]
# 指定模式：only_do 先纳入匹配品种/合约，not_do 再从中排除匹配品种/合约。
# mode = "指定模式"
# only_do = ["AG"]
# not_do = ["AG2607"]

[datasource.tqsdk]
# username = "your-tqsdk-username"
# password = "your-tqsdk-password"
username_env = "TQSDK_USERNAME"
password_env = "TQSDK_PASSWORD"
symbol_info_batch_size = 500
quote_subscription_batch_size = 500

[[strategies]]
type = "cp_combo"
min_value = 0.01
max_value = inf
name = "CP组合正向预警"
selected = true
# Optional per-strategy option filter script. Absolute paths are safest.
# Relative paths are still supported and resolve from this config file.
# filter_script = "C:/path/to/filter_scripts/gold_options.py"
# filter_function = "accept"
# filter_scope = "options"

[[strategies]]
type = "cp_combo"
min_value = -inf
max_value = -0.01
name = "CP组合负向预警"
selected = true

[[strategies]]
type = "abs_spread"
min_value = -inf
max_value = 0.1
name = "价差预警"
selected = true

[backtest]
start_dt = "2026-01-02"
end_dt = "2026-01-05"
duration_seconds = 60
data_length = 2
initial_price_timeout_seconds = 120
subscription_batch_size = 50

[notifier]
# If [notifier.channels] is omitted, live defaults to email+file and backtest defaults to file.
# Runtime mode is inserted as a subdirectory: logs/live/alerts.jsonl or logs/backtest/alerts.jsonl.
alert_log_path = "logs/alerts.jsonl"

[notifier.channels]
popup = false
sound = false
file = true
email = true

[notifier.popup]
duration_seconds = 2

[notifier.sound]
duration_seconds = 2

[notifier.email]
smtp_host = "smtp.example.com"
smtp_port = 587
smtp_timeout_seconds = 10
# Batch email alerts for this many seconds; 0 sends immediately.
alert_interval_seconds = 60
username = "alert@example.com"
password_env = "SMTP_PASSWORD"
from_addr = "alert@example.com"
to_addrs = ["receiver@example.com"]
use_tls = true
failure_backoff_seconds = 300

[logging]
level = "INFO"
# Runtime mode is inserted as a subdirectory: logs/live/optionsentry.log or logs/backtest/optionsentry.log.
log_dir = "logs"
log_file = "optionsentry.log"
# Rotating logs cap disk usage at about max_bytes * (backup_count + 1).
max_bytes = 5000000
backup_count = 5
# INFO cycle summaries are throttled; per-cycle details are available at DEBUG.
# Set to 0 to log every cycle.
cycle_summary_interval_seconds = 60

[gui.active_alerts]
auto_refresh = true
refresh_interval_seconds = 10
